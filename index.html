/* ── CSV DOWNLOAD ── */
function dlCSV(name, rows) {
  const csv = rows.map(r => r.map(c => `"${String(c ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download = name; a.click();
}

/* ═══════════════════════════════════════════════════════════ MAIN APP */
function App() {
  const [tab,   setTab]   = useState('workflow');
  const [selId, setSelId] = useState(INVOICES[0].id);
  const [toasts,setToasts]= useState([]);
  const [panel, setPanel] = useState(null);   // 'gl'|'approve'|'return'|'reject'
  const [glPick, setGlPick]     = useState('');
  const [apprNote, setApprNote] = useState('');
  const [retNote,  setRetNote]  = useState('');
  const [rejNote,  setRejNote]  = useState('');
  const [payRun,   setPayRun]   = useState({ reviewing:false, released:false });

  const [states, setStates] = useState(() => INVOICES.reduce((acc, inv) => {
    acc[inv.id] = { status:'Received', gl:inv.gl, trail:[], a1:null, a2:null, reconDone:false };
    return acc;
  }, {}));

  const inv   = INVOICES.find(i => i.id === selId);
  const state = states[selId];

  /* helpers */
  const toast = useCallback((msg, type='ok') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);

  const log = useCallback((id, action, detail) => {
    setStates(p => ({ ...p, [id]: { ...p[id], trail: [...p[id].trail, { action, detail, t: nowT() }] } }));
  }, []);

  const upd = useCallback((id, patch) => setStates(p => ({ ...p, [id]: { ...p[id], ...patch } })), []);

  /* ── WORKFLOW ACTIONS ── */
  const doProcess = useCallback(() => {
    if (inv.conf === 'high') {
      upd(inv.id, { status:'Processing', gl: inv.gl });
      log(inv.id, 'Auto-Process', `GL ${inv.gl} auto-assigned — high confidence`);
      toast('✓ Processed — GL auto-assigned (high confidence)');
    } else {
      upd(inv.id, { status:'Awaiting FM Review' });
      log(inv.id, 'Flagged for FM Review', `${inv.conf} confidence — manual GL assignment required`);
      toast('⚠ Flagged for FM Review — GL assignment required', 'warn');
    }
    setPanel(null);
  }, [inv, log, upd, toast]);

  const doAssignGL = useCallback(() => {
    const code = glPick || '6300';
    upd(inv.id, { status:'Processing', gl: code });
    log(inv.id, 'FM — GL Assigned', `GL ${code} manually assigned by ${TEAM.FM.name}`);
    toast(`✓ GL ${code} assigned by Finance Manager`);
    setGlPick(''); setPanel(null);
  }, [inv, glPick, log, upd, toast]);

  const doSendApproval = useCallback(() => {
    upd(inv.id, { status:'Pending Approval' });
    log(inv.id, 'Sent to #ap-approvals', `Approval request posted to Slack by ${TEAM.FM.name}`);
    toast('📨 Sent to #ap-approvals');
    setPanel(null);
  }, [inv, log, upd, toast]);

  const doApprove = useCallback(() => {
    const dual = inv.amount >= 10000;
    if (dual && !state.a1) {
      const tl = TEAM[inv.approverKey]?.name || 'Team Lead';
      upd(inv.id, { a1: tl });
      log(inv.id, 'Team Lead Approved', `${tl} approved${apprNote ? ': ' + apprNote : ''} — awaiting ${TEAM.HOF.name}`);
      toast(`✓ First approval by ${tl} — awaiting ${TEAM.HOF.name}`);
    } else {
      const finalApprover = dual ? TEAM.HOF.name : (TEAM[inv.approverKey]?.name || 'Team Lead');
      upd(inv.id, { status:'Approved', a2: dual ? TEAM.HOF.name : null });
      log(inv.id, 'Fully Approved', `${finalApprover} gave final approval${apprNote ? ': ' + apprNote : ''}`);
      toast('✅ Invoice fully approved!');
    }
    setApprNote(''); setPanel(null);
  }, [inv, state, apprNote, log, upd, toast]);

  const doReject = useCallback(() => {
    upd(inv.id, { status:'Rejected' });
    log(inv.id, 'Rejected', `Reason: ${rejNote || 'No reason provided'}`);
    toast('✗ Invoice rejected', 'err');
    setRejNote(''); setPanel(null);
  }, [inv, rejNote, log, upd, toast]);

  const doReturn = useCallback(() => {
    upd(inv.id, { status:'Processing', a1:null });
    log(inv.id, 'Returned to FM', `Reason: ${retNote || 'No reason provided'}`);
    toast('↩ Returned to Finance Manager');
    setRetNote(''); setPanel(null);
  }, [inv, retNote, log, upd, toast]);

  const doEnterQBO = useCallback(() => {
    upd(inv.id, { status:'In QBO' });
    log(inv.id, 'Entered in QBO', `Bill created in QuickBooks Online by ${TEAM.FM.name}`);
    toast('📘 Entered in QuickBooks Online');
  }, [inv, log, upd, toast]);

  const doSchedule = useCallback(() => {
    upd(inv.id, { status:'Scheduled' });
    log(inv.id, 'Scheduled for Payment', 'Added to Tuesday payment run');
    toast('📅 Scheduled for Tuesday payment run');
  }, [inv, log, upd, toast]);

  const doPaid = useCallback((id) => {
    const target = id || inv.id;
    upd(target, { status:'Paid' });
    log(target, 'Payment Released', `Released by ${TEAM.HOF.name} — confirmation logged`);
    toast('💸 Payment released and confirmed');
  }, [inv, log, upd, toast]);

  const doStartRecon = useCallback((id) => {
    const target = id || inv.id;
    upd(target, { status:'Recon In Progress' });
    log(target, 'Reconciliation Started', `Internal DB vs. Stripe report comparison initiated by ${TEAM.FM.name}`);
    toast('🔍 Reconciliation started');
  }, [inv, log, upd, toast]);

  const doClearRecon = useCallback((id) => {
    const target = id || inv.id;
    upd(target, { status:'Reconciled & Posted', reconDone:true, gl:'6600' });
    log(target, 'Reconciled & Posted to QBO', `All transactions matched/cleared. Posted directly to QBO — GL 6600 by ${TEAM.FM.name}`);
    toast('✅ Reconciled and posted directly to QBO');
  }, [inv, log, upd, toast]);

  /* ── EXPORTS ── */
  const exportLog = useCallback(() => {
    const hdr = ['INV Ref #','Vendor','Entity','Invoice Date','Due Date','Amount','Currency','GL Code','GL Account','Department','Memo','Status','Approver','Tags'];
    const rows = INVOICES.map(i => {
      const s = states[i.id]; const gl = GL_CODES.find(g => g.code === s.gl);
      const appr = i.amount >= 10000 ? `${TEAM[i.approverKey]?.name||'TL'} + ${TEAM.HOF.name}` : (TEAM[i.approverKey]?.name||'TL');
      return [i.id, i.vendor, i.entity, i.date, i.due, i.amount, 'CAD', s.gl||'', gl?.label||'', i.dept, i.memo, s.status, appr, i.tags.join('; ')];
    });
    dlCSV(`Loop_AP_Invoice_Log_${new Date().toISOString().slice(0,10)}.csv`, [hdr, ...rows]);
    toast('📥 Invoice Log CSV downloaded');
  }, [states, toast]);

  const exportQBO = useCallback(() => {
    const eligible = INVOICES.filter(i => ['Approved','In QBO','Scheduled','Paid','Reconciled & Posted'].includes(states[i.id].status));
    if (!eligible.length) { toast('No approved invoices to export yet', 'warn'); return; }
    const hdr = ['RefNo','Vendor','InvoiceDate','DueDate','Terms','Memo','GLAccount','GLCode','Amount','Currency','Department','Entity','ApprovedBy','Status'];
    const rows = eligible.flatMap(i => {
      const s = states[i.id];
      if (i.split) return i.split.map(ln => {
        const gl = GL_CODES.find(g => g.code === ln.gl);
        return [`${i.id}-${ln.line}`, i.vendor, i.date, i.due, i.terms, i.memo, gl?.label||'', ln.gl, ln.amount, 'CAD', ln.dept, i.entity, TEAM.HOF.name, s.status];
      });
      const gl = GL_CODES.find(g => g.code === s.gl);
      const appr = i.amount >= 10000 ? `${TEAM[i.approverKey]?.name||'TL'} + ${TEAM.HOF.name}` : TEAM[i.approverKey]?.name||'TL';
      return [[i.id, i.vendor, i.date, i.due, i.terms, i.memo, gl?.label||'', s.gl||'', i.amount, 'CAD', i.dept, i.entity, appr, s.status]];
    });
    dlCSV(`Loop_AP_QBO_Batch_${new Date().toISOString().slice(0,10)}.csv`, [hdr, ...rows]);
    toast('📥 QBO batch CSV downloaded');
  }, [states, toast]);

  const exportPaySheet = useCallback(() => {
    const eligible = INVOICES.filter(i => ['Approved','In QBO','Scheduled'].includes(states[i.id].status));
    if (!eligible.length) { toast('No invoices ready for the payment sheet yet', 'warn'); return; }
    const hdr = ['INV Ref #','Vendor','Entity','Amount','Currency','Due Date','Payment Method','Status','Memo'];
    const rows = eligible.map(i => [i.id, i.vendor, i.entity, i.amount, 'CAD', i.due, 'EFT', states[i.id].status, i.memo]);
    dlCSV(`Loop_AP_Payment_Sheet_${new Date().toISOString().slice(0,10)}.csv`, [hdr, ...rows]);
    toast('📥 Payment sheet downloaded');
  }, [states, toast]);

  /* ── STATS ── */
  const stats = useMemo(() => {
    const total   = INVOICES.reduce((a,i) => a + i.amount, 0);
    const approved= INVOICES.filter(i => ['Approved','In QBO','Scheduled','Paid','Reconciled & Posted'].includes(states[i.id].status)).reduce((a,i)=>a+i.amount,0);
    const paid    = INVOICES.filter(i => ['Paid','Reconciled & Posted'].includes(states[i.id].status)).reduce((a,i)=>a+i.amount,0);
    const pending = INVOICES.filter(i => states[i.id].status === 'Pending Approval').length;
    const fmReview= INVOICES.filter(i => states[i.id].status === 'Awaiting FM Review').length;
    return { total, approved, paid, pending, fmReview };
  }, [states]);

  /* ── PHASE CALCULATION ── */
  const phase = (status) => {
    const map = { 'Received':1,'Awaiting FM Review':2,'Processing':3,'Pending Approval':4,'Approved':4,'In QBO':5,'Scheduled':7,'Paid':7,'Recon In Progress':6,'Reconciled & Posted':6 };
    return map[status] || 0;
  };

  /* ── CONTROLS DATA ── */
  const controls = [
    { type:'Preventative', bg:'bg-blue-700', items:[
      { label:'Single Intake Channel',  desc:'All invoices must arrive at ap@loopfinancial.com. No invoice is processed if received through other channels without being forwarded first.' },
      { label:'Completeness Gate',      desc:'Missing required fields block all processing. The invoice is returned to the vendor before a log entry is created.' },
      { label:'Duplicate Detection',    desc:'FM checks for the same vendor and similar amount within a 30-day window before logging a new entry.' },
      { label:'PO Matching',            desc:'Where a PO exists, the invoiced amount must match within 5%. Variances above 5% are flagged before approval.' },
      { label:'Segregation of Duties',  desc:'FM codes invoices; a separate Team Lead (and Head of Finance for amounts of $10K and above) must approve. FM cannot self-approve.' },
    ]},
    { type:'Detective', bg:'bg-violet-700', items:[
      { label:'GL Confidence Scoring',       desc:'Low and medium confidence GL codes are flagged in the Invoice Log and require FM review before the invoice can advance.' },
      { label:'Period Matching',             desc:'The invoice billing period must match the period in which services were delivered. Retroactive invoices are flagged.' },
      { label:'Partner Reconciliation',      desc:'Payment partner invoices are reconciled against internal transaction database records before being posted to QBO.' },
      { label:'Post-Payment Reconciliation', desc:'FM matches payment confirmation numbers against the Invoice Log and bank records after every payment run.' },
    ]},
    { type:'Approval Controls', bg:'bg-amber-600', items:[
      { label:'Dollar Threshold Matrix', desc:'Under $10K: single Team Lead approval. $10K and above: Team Lead approval followed by Dave McKenzie (Head of Finance).' },
      { label:'3-Business-Day SLA',     desc:'Team Leads must respond within 3 business days. FM escalates to Dave McKenzie at the 72-hour mark if no response is received.' },
      { label:'Dual-Approval Logging',  desc:'Both approval timestamps and approver names are recorded in the Invoice Log and per-invoice audit trail.' },
      { label:'PO Pre-Authorisation',   desc:'Standing POs eliminate per-invoice Team Lead approval for covered vendors — one approval covers the full year of spend.' },
    ]},
    { type:'Completeness', bg:'bg-teal-700', items:[
      { label:'Invoice Log',          desc:'Every invoice has a log entry from receipt to payment. All status changes are timestamped with the actor recorded.' },
      { label:'File Naming Standard', desc:'Entity/YYYY-MM/Vendor - Invoice - INV# - MMM YYYY.pdf ensures every invoice is traceable and correctly filed.' },
      { label:'QBO as Payment Gate',  desc:'No invoice can be paid unless it is entered in QBO, confirming it has been approved internally and GL-coded correctly.' },
      { label:'Full Audit Trail',     desc:'Every action — received, processed, sent for approval, approved, entered in QBO, and paid — is logged with time and actor.' },
    ]},
  ];

  /* ═══════════════════════════════════════════════════ RENDER */
  return (
    <div className="min-h-screen bg-slate-50">

      {/* top banner */}
      <div className="bg-indigo-900 text-indigo-200 text-xs text-center py-2 font-medium">
        🔗 AP Automation Demo — Loop Financial Inc. &nbsp;|&nbsp; Open in Chrome or Firefox &nbsp;|&nbsp; Requires internet connection to load React and Tailwind
      </div>

      {/* header */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div className="max-w-screen-xl mx-auto px-3 sm:px-5 py-3 flex items-center gap-3 sm:gap-5">
          {/* logo */}
          <div className="flex items-center gap-2 flex-shrink-0">
            <div className="w-9 h-9 bg-indigo-700 rounded-lg flex items-center justify-center text-white font-bold text-sm">LF</div>
            <div>
              <div className="font-bold text-slate-900 text-sm leading-none">Loop Financial</div>
              <div className="text-xs text-slate-400 leading-none mt-0.5">AP Automation v2.1</div>
            </div>
          </div>
          {/* stats strip */}
          <div className="hidden md:flex items-center gap-5 text-xs ml-4">
            {[
              { label:'Pipeline',    val:fmt(stats.total),    color:'text-slate-900' },
              { label:'Approved',    val:fmt(stats.approved), color:'text-green-700' },
              { label:'Paid',        val:fmt(stats.paid),     color:'text-emerald-700' },
              { label:'Pending',     val:stats.pending,       color:'text-violet-700' },
              { label:'FM Review',   val:stats.fmReview,      color:'text-amber-700' },
            ].map(s => (
              <div key={s.label} className="text-center">
                <div className={`font-bold ${s.color}`}>{s.val}</div>
                <div className="text-slate-400">{s.label}</div>
              </div>
            ))}
          </div>
          {/* export buttons */}
          <div className="ml-auto flex gap-2 flex-shrink-0">
            <button onClick={exportLog} className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 transition"><I n="dl"/><span className="hidden sm:inline ml-0.5">Invoice Log</span></button>
            <button onClick={exportQBO} className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 transition"><I n="dl"/><span className="hidden sm:inline ml-0.5">QBO Export</span></button>
            <button onClick={exportPaySheet} className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 text-xs font-medium rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white transition"><I n="dollar"/><span className="hidden sm:inline ml-0.5">Payment Sheet</span></button>
          </div>
        </div>
        {/* tab bar */}
        <div className="max-w-screen-xl mx-auto px-2 sm:px-5 border-t border-slate-100">

              { id:'approvals', label:'#ap-approvals',     icon:'slack'   },
              { id:'recon',     label:'Partner Recon',     icon:'refresh' },
              { id:'payment',   label:'Payment Run',       icon:'dollar'  },
              { id:'controls',  label:'Internal Controls', icon:'shield'  },
              { id:'dashboard', label:'FM Dashboard',      icon:'chart'   },
              { id:'logs',      label:'Audit Logs',        icon:'list'    },

        </div>

          <div className="flex-1 space-y-4">

              {(() => {
                const visPhases = inv.type === 'partner_recon'
                  ? [{ n:1,l:'Intake' },{ n:6,l:'Reconcile' },{ n:7,l:'Payment' }]

                const cp = phase(state.status);
                return (
                  <div className="flex items-center gap-1">
                    {visPhases.map((p, idx) => {
                      const active = cp === p.n;
                      const done   = cp > p.n || (p.n===7 && cp===7 && state.status==='Paid');
                      return (
                        <React.Fragment key={p.n}>
                          <div className="flex flex-col items-center gap-1 flex-1">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition
                              ${active ? 'bg-indigo-600 text-white ring-4 ring-indigo-100' : done ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                              {done ? '✓' : p.n}
                            </div>
                            <span className={`text-xs text-center leading-tight ${active?'font-bold text-slate-800':done?'text-emerald-700':'text-slate-400'}`}>{p.l}</span>
                          </div>
                          {idx < visPhases.length-1 && <div className={`h-0.5 w-5 flex-shrink-0 mb-4 ${done?'bg-emerald-400':'bg-slate-200'}`}></div>}
                        </React.Fragment>
                      );
                    })}
                  </div>
                );
              })()}
            </div>

            {/* invoice detail */}
            <div className="bg-white rounded-2xl border border-slate-200 p-5 space-y-4">
              <div className="flex items-start justify-between">
                <div>
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <h2 className="text-xl font-bold text-slate-900">{inv.vendor}</h2>
                    <StatusPill status={state.status}/>
                    {state.a1 && !state.a2 && inv.amount >= 10000 && <Pill cls="bg-amber-100 text-amber-800">Awaiting {TEAM.HOF.name}</Pill>}
                  </div>
                  <div className="text-xs text-slate-500">{inv.id} · {inv.entity} · Invoice date {inv.date} · Due {inv.due}</div>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-2xl font-bold text-slate-900">{fmt(inv.amount)}</div>
                  <div className="text-xs text-slate-400 mt-0.5">{inv.terms}</div>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 py-3 border-t border-b border-slate-100">
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Memo</div>
                  <div className="text-sm text-slate-700">{inv.memo}</div>
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">GL Account</div>
                  <div className="text-sm font-medium text-slate-700">
                    {state.gl ? `${state.gl} — ${GL_CODES.find(g=>g.code===state.gl)?.label||''}` : <span className="text-amber-600">Not yet assigned</span>}
                  </div>
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Department</div>
                  <div className="text-sm text-slate-700">{inv.dept}</div>
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Confidence</div>
                  <ConfPill c={inv.conf}/>
                </div>
                {inv.po && (
                  <div>
                    <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">PO Reference</div>
                    <div className="text-sm font-medium text-green-700">{inv.po} — Team Lead approval waived</div>
                  </div>
                )}
                {inv.split && (
                  <div className="col-span-2">
                    <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Split Coding</div>
                    <div className="space-y-1.5">
                      {inv.split.map(ln => (
                        <div key={ln.line} className="flex items-center gap-3 text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                          <span className="font-mono text-xs bg-white border border-slate-200 rounded px-1.5 py-0.5 font-bold">{inv.id}-{ln.line}</span>
                          <span className="text-slate-600 flex-1">{ln.gl} — {ln.label} · {ln.dept}</span>
                          <span className="font-bold text-slate-900">{fmt(ln.amount)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* dual approval panel */}
              {inv.amount >= 10000 && (
                <div>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Dual Approval Required (≥$10K)</div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {[
                      { person: TEAM[inv.approverKey]||TEAM.FM, done: !!state.a1, label: state.a1 ? '✓ First approval recorded' : 'Awaiting first approval' },
                      { person: TEAM.HOF, done: !!state.a2, label: state.a2 ? '✓ Final approval given' : 'Awaiting second approval' },
                    ].map((row,i) => (
                      <div key={i} className={`flex items-start gap-2 p-3 rounded-xl border ${row.done ? 'border-green-200 bg-green-50' : 'border-slate-200 bg-slate-50'}`}>
                        <Av p={row.person}/>
                        <div>
                          <div className="text-xs font-bold text-slate-800">{row.person.name}</div>
                          <div className="text-xs text-slate-500">{row.person.role}</div>
                          <div className={`text-xs font-medium mt-1 ${row.done ? 'text-green-700' : 'text-slate-400'}`}>{row.label}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* action buttons */}
              <div className="space-y-3">
                <div className="flex flex-wrap gap-2">
                  {state.status === 'Received' && inv.type !== 'partner_recon' &&
                    <button onClick={doProcess} className="flex items-center gap-1.5 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition"><I n="eye"/> Process Invoice</button>}
                  {state.status === 'Received' && inv.type === 'partner_recon' &&
                    <button onClick={() => doStartRecon(inv.id)} className="flex items-center gap-1.5 px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium rounded-lg transition"><I n="refresh"/> Start Reconciliation</button>}
                  {state.status === 'Awaiting FM Review' &&
                    <button onClick={() => setPanel('gl')} className="flex items-center gap-1.5 px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white text-sm font-medium rounded-lg transition"><I n="eye"/> Assign GL Code</button>}
                  {state.status === 'Processing' &&
                    <button onClick={doSendApproval} className="flex items-center gap-1.5 px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white text-sm font-medium rounded-lg transition"><I n="send"/> Send for Approval</button>}
                  {state.status === 'Pending Approval' && <>
                    <button onClick={() => setPanel('approve')} className="flex items-center gap-1.5 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition">

                    </button>

                  {state.status === 'In QBO' &&

            )}
            <div className="space-y-1.5">
              {INVOICES.flatMap(i => states[i.id].trail.map(e => ({ ...e, inv:i }))).map((e, idx) => {
                const isControl = ['Flagged','Rejected','Returned','First Approval','Reconcil','GL Assigned'].some(kw => e.action.includes(kw));
                return (
                  <div key={idx} className={`flex items-start gap-3 px-3 py-2 rounded-xl text-xs ${isControl ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50'}`}>
                    <span className="font-mono text-slate-400 w-14 sm:w-20 flex-shrink-0">{e.t}</span>
                    <span className="font-bold text-slate-600 w-14 sm:w-20 flex-shrink-0">{e.inv.id}</span>
                    {isControl && <span className="text-amber-600 flex-shrink-0"><I n="shield"/></span>}
                    <span className="font-semibold text-slate-800">{e.action}</span>
                    <span className="text-slate-500">— {e.detail}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ════════════════ FM DASHBOARD TAB */}
      {tab === 'dashboard' && (
        <div className="space-y-5">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {[
              { label:'Total Pipeline',    val:fmt(stats.total),    sub:'8 invoices',                   color:'text-slate-900', bg:'bg-white' },
              { label:'Approved Value',    val:fmt(stats.approved), sub:'Approved or beyond',            color:'text-green-700', bg:'bg-green-50 border-green-200' },
              { label:'Paid This Cycle',   val:fmt(stats.paid),     sub:'Released and confirmed',        color:'text-emerald-700',bg:'bg-emerald-50 border-emerald-200' },
              { label:'Pending Approval',  val:stats.pending,       sub:'awaiting Team Lead response',   color:'text-violet-700', bg:'bg-violet-50 border-violet-200' },
            ].map(c => (
              <div key={c.label} className={`rounded-2xl border p-5 ${c.bg}`}>
                <div className="text-xs text-slate-500 font-medium mb-2">{c.label}</div>
                <div className={`text-2xl font-bold ${c.color}`}>{c.val}</div>
                <div className="text-xs text-slate-400 mt-1">{c.sub}</div>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div className="bg-white rounded-2xl border border-slate-200 p-5">
              <h3 className="font-semibold text-slate-800 mb-4">Status Breakdown</h3>
              <div className="space-y-2">
                {Object.entries(INVOICES.reduce((acc,i) => { acc[states[i.id].status] = (acc[states[i.id].status]||0)+1; return acc; }, {})).map(([status, count]) => {
                  const m = SM[status] || SM['Received'];
                  return (
                    <div key={status} className="flex items-center gap-3">
                      <div className="w-24 text-xs text-slate-500 truncate">{m.label}</div>
                      <div className="flex-1 bg-slate-100 rounded-full h-2">
                        <div className={`h-2 rounded-full ${m.dot}`} style={{ width:`${(count/INVOICES.length)*100}%` }}></div>
                      </div>
                      <div className="w-4 text-xs font-bold text-slate-700 text-right">{count}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-white rounded-2xl border border-slate-200 p-5">
              <h3 className="font-semibold text-slate-800 mb-4">By Entity</h3>
              {['Loop Financial Inc.','Loop Payments Inc.'].map(entity => {
                const ents = INVOICES.filter(i => i.entity === entity);
                return (
                  <div key={entity} className="mb-4">
                    <div className="text-xs font-semibold text-slate-500 mb-1">{entity}</div>
                    <div className="text-lg font-bold text-indigo-700 mb-2">{fmt(ents.reduce((a,i)=>a+i.amount,0))}</div>
                    {ents.map(i => (
                      <div key={i.id} className="flex items-center justify-between text-xs py-1 border-b border-slate-100">
                        <span className="text-slate-600">{i.id} — {i.vendor}</span>
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-slate-900">{fmt(i.amount)}</span>
                          <StatusPill status={states[i.id].status}/>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-slate-200 p-5">
            <h3 className="font-semibold text-slate-800 mb-4">Process Improvements — Tracker</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div className="rounded-xl border border-green-200 bg-green-50 p-4">
                <div className="text-xs font-bold text-green-800 uppercase tracking-wide mb-2">Annual Billing Candidates</div>
                {INVOICES.filter(i => ['Datadog','Slack','Figma'].includes(i.vendor)).map(i => (
                  <div key={i.id} className="flex items-center justify-between text-xs py-1 border-b border-green-100">
                    <span className="font-medium text-green-900">{i.vendor}</span>
                    <span className="text-green-700">{fmt(i.amount)}/mo → est. {fmt(i.amount*10)}/yr (10% saving)</span>
                  </div>
                ))}
                <div className="text-xs text-green-700 mt-2 font-medium">Switching to annual billing eliminates 11 monthly approval cycles per vendor per year.</div>
              </div>
              <div className="rounded-xl border border-indigo-200 bg-indigo-50 p-4">
                <div className="text-xs font-bold text-indigo-800 uppercase tracking-wide mb-2">PO-Backed Invoices (TL Approval Waived)</div>
                {INVOICES.filter(i => i.po).map(i => (
                  <div key={i.id} className="flex items-center justify-between text-xs py-1 border-b border-indigo-100">
                    <span className="font-medium text-indigo-900">{i.vendor}</span>
                    <span className="text-indigo-700">{i.po}</span>
                  </div>
                ))}
                <div className="text-xs text-indigo-700 mt-2 font-medium">Standing POs replace per-invoice Team Lead approval with a single annual sign-off.</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ════════════════ AUDIT LOGS TAB */}
      {tab === 'logs' && (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h2 className="font-bold text-slate-900">Full Audit Log</h2>
            <div className="flex gap-2">
              <button onClick={exportLog} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 transition"><I n="dl"/> Invoice Log CSV</button>
              <button onClick={exportQBO} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 hover:bg-slate-50 text-slate-700 transition"><I n="dl"/> QBO Export CSV</button>
              <button onClick={exportPaySheet} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white transition"><I n="dl"/> Payment Sheet CSV</button>
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
            <div className="px-5 py-3 border-b border-slate-100 text-sm font-semibold text-slate-700">Invoice Log — All Invoices</div>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead className="bg-slate-50 border-b border-slate-200">
                  <tr>{['INV #','Vendor','Entity','Amount','GL','Dept','Memo','Due','Status','Tags'].map(h=><th key={h} className="px-3 py-2.5 text-left font-semibold text-slate-500 uppercase tracking-wide whitespace-nowrap">{h}</th>)}</tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {INVOICES.map((i,idx) => {
                    const s = states[i.id]; const gl = GL_CODES.find(g=>g.code===s.gl);
                    return (
                      <tr key={i.id} className={`cursor-pointer hover:bg-indigo-50 transition ${idx%2===0?'bg-white':'bg-slate-50/50'}`} onClick={()=>{setSelId(i.id);setTab('workflow');}}>
                        <td className="px-3 py-2.5 font-mono font-bold text-slate-700">{i.id}</td>
                        <td className="px-3 py-2.5 font-semibold text-slate-900">{i.vendor}</td>
                        <td className="px-3 py-2.5 text-slate-500 whitespace-nowrap">{i.entity.replace('Loop ','')}</td>
                        <td className="px-3 py-2.5 font-bold text-slate-900 whitespace-nowrap">{fmt(i.amount)}</td>
                        <td className="px-3 py-2.5 font-mono text-slate-600">{s.gl||<span className="text-amber-500">—</span>}</td>
                        <td className="px-3 py-2.5 text-slate-600">{i.dept}</td>
                        <td className="px-3 py-2.5 text-slate-500 max-w-xs truncate">{i.memo}</td>
                        <td className="px-3 py-2.5 text-slate-500 whitespace-nowrap">{i.due}</td>
                        <td className="px-3 py-2.5 whitespace-nowrap"><StatusPill status={s.status}/></td>
                        <td className="px-3 py-2.5"><div className="flex gap-1 flex-wrap">{i.tags.map(t=><span key={t} className="px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-xs">{t}</span>)}</div></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {INVOICES.filter(i => states[i.id].trail.length > 0).map(i => (
            <div key={i.id} className="bg-white rounded-2xl border border-slate-200 p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                  <span className="font-mono font-bold text-slate-700">{i.id}</span>
                  <span className="font-semibold text-slate-900">{i.vendor}</span>
                  <span className="font-bold text-slate-900">{fmt(i.amount)}</span>
                </div>
                <StatusPill status={states[i.id].status}/>
              </div>
              <div className="space-y-1.5">
                {states[i.id].trail.map((e,idx) => (
                  <div key={idx} className="flex items-start gap-3 text-xs">
                    <span className="font-mono text-slate-400 w-14 sm:w-20 flex-shrink-0">{e.t}</span>
                    <span className="w-2 h-2 rounded-full bg-indigo-300 mt-1 flex-shrink-0"></span>
                    <span className="font-semibold text-slate-800">{e.action}</span>
                    <span className="text-slate-500">— {e.detail}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {INVOICES.every(i => states[i.id].trail.length === 0) && (
            <div className="bg-white rounded-2xl border border-slate-200 p-10 text-center text-slate-400 text-sm">No audit events yet. Process invoices in the Workflow tab to generate an audit trail.</div>
          )}
        </div>
      )}

      </main>

      <footer className="border-t border-slate-200 bg-white mt-10 px-5 py-4">
        <div className="max-w-screen-xl mx-auto flex flex-col sm:flex-row items-start sm:items-center gap-1 sm:gap-0 justify-between text-xs text-slate-400">
          <span>Loop Financial Inc. · AP Automation Demo v2.1 · Finance Manager: Shashwat Yadav · Head of Finance: Dave McKenzie · HR: Mandy Ho</span>
          <span>Confidential — Internal Use Only · April 2026</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
